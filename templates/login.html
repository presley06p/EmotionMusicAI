{% extends "base.html" %}
{% block title %}Sign In — EmoTune AI{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-bg-orb auth-orb-1"></div>
  <div class="auth-bg-orb auth-orb-2"></div>

  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5 col-lg-4">

        <div class="auth-card glass-card">
          <div class="auth-brand text-center mb-4">
            <div class="auth-logo-icon">◈</div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to EmoTune AI</p>
          </div>

          <form method="POST" action="{{ url_for('login') }}" novalidate>
            <div class="form-group-ai mb-3">
              <label class="form-label-ai">Email or Username</label>
              <div class="input-icon-wrap">
                <i class="bi bi-person input-icon"></i>
                <input
                  type="text" name="identifier"
                  class="form-control-ai"
                  placeholder="you@example.com"
                  required autocomplete="username"
                />
              </div>
            </div>

            <div class="form-group-ai mb-4">
              <label class="form-label-ai">Password</label>
              <div class="input-icon-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input
                  type="password" name="password" id="passwordInput"
                  class="form-control-ai"
                  placeholder="••••••••"
                  required autocomplete="current-password"
                />
                <button type="button" class="input-eye" onclick="togglePw('passwordInput', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-accent w-100 btn-auth">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <div class="auth-divider"><span>or</span></div>

          <p class="auth-switch text-center">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="auth-link">Create one</a>
          </p>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
